version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: qwenvl_chat
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@db:3306/qwenvl_chat?charset=utf8mb4
      # IMPORTANT: Set your ZhipuAI key here before running
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY:-your-default-key-here}
      - JWT_SECRET=super-secret-key-please-change-in-prod
    depends_on:
      - db
    volumes:
      - ./backend:/app
      # Map an uploads folder so we don't lose images on container restart
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
